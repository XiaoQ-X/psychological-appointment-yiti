server:
  port: ${SERVER_PORT:8080}

spring:
  application:
    name: psych-appointment-backend
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/psych_appointment?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true}
    username: ${DB_USERNAME:psych}
    password: ${DB_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      database: ${REDIS_DATABASE:0}
  flyway:
    enabled: true
    locations: classpath:db/migration
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
        jdbc:
          time_zone: Asia/Shanghai
  servlet:
    multipart:
      max-file-size: ${MAX_UPLOAD_FILE_SIZE:5MB}
      max-request-size: ${MAX_UPLOAD_REQUEST_SIZE:6MB}

management:
  endpoints:
    web:
      exposure:
        include: health,info

app:
  security:
    cors-allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173}
    token-secret: ${TOKEN_SECRET:}
    access-token-minutes: ${ACCESS_TOKEN_MINUTES:30}
    refresh-token-days: ${REFRESH_TOKEN_DAYS:14}
    sensitive-data-key-base64: ${SENSITIVE_DATA_KEY_BASE64:}
  bootstrap:
    admin:
      enabled: ${BOOTSTRAP_ADMIN_ENABLED:true}
      username: ${BOOTSTRAP_ADMIN_USERNAME:}
      password: ${BOOTSTRAP_ADMIN_PASSWORD:}
      name: ${BOOTSTRAP_ADMIN_NAME:系统管理员}
      department: ${BOOTSTRAP_ADMIN_DEPARTMENT:心理中心}
  import:
    max-student-rows: ${MAX_STUDENT_IMPORT_ROWS:5000}
  upload:
    temp-dir: ${UPLOAD_TEMP_DIR:uploads/tmp}
