name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  production-image-integrity:
    name: production-image-integrity
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Test image pin policy
        run: python3 -m unittest discover -s deploy/tests -p 'test_*.py'
      - name: Verify production image pins and provenance
        run: python3 deploy/verify_image_pins.py --verify-registry

  backend-test:
    name: backend-test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: psych-appointment-backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven
      - run: mvn test
      - run: mvn -DskipTests package

  admin-web:
    name: admin-web
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: psych-appointment-admin-web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: psych-appointment-admin-web/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run build

  miniprogram-syntax:
    name: miniprogram-syntax
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: psych-appointment-miniprogram
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Check JavaScript syntax
        shell: bash
        run: |
          while IFS= read -r -d '' file; do
            node --check "$file"
          done < <(find . -name '*.js' -print0)
